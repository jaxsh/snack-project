# lowcode_flow_chain 流程执行链定义表
databaseChangeLog:
  - changeSet:
      id: create-lowcode_flow_chain
      author: lowcode
      changes:
        - createTable:
            tableName: lowcode_flow_chain
            remarks: 流程执行链定义表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: flow_id
                  type: bigint
                  remarks: 关联业务流程
                  constraints:
                    nullable: false
              - column:
                  name: chain_el
                  type: clob
                  remarks: 流程执行表达式
                  constraints:
                    nullable: false
              - column:
                  name: chain_json
                  type: clob
                  remarks: 可视化配置JSON
              - column:
                  name: execute_mode
                  type: varchar(10)
                  defaultValue: SYNC
                  remarks: 执行模式(SYNC:同步, ASYNC:异步)
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 1
                  remarks: 版本号
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - createIndex:
            tableName: lowcode_flow_chain
            indexName: idx_flow_chain_flow_id
            columns:
              - column:
                  name: flow_id
