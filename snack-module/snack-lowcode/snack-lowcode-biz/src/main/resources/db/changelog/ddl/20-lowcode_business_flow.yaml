# lowcode_business_flow 业务流程定义表
databaseChangeLog:
  - changeSet:
      id: create-lowcode_business_flow
      author: lowcode
      changes:
        - createTable:
            tableName: lowcode_business_flow
            remarks: 业务流程定义表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: flow_code
                  type: varchar(100)
                  remarks: 业务流程编码
                  constraints:
                    nullable: false
              - column:
                  name: flow_name
                  type: varchar(200)
                  remarks: 业务流程名称
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
                  remarks: 描述
              - column:
                  name: main_schema
                  type: varchar(100)
                  remarks: 主模型名称
              - column:
                  name: trigger_type
                  type: varchar(20)
                  defaultValue: API
                  remarks: 触发类型(API:接口触发, TIMER:定时触发, EVENT:事件触发)
              - column:
                  name: enabled
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: 状态(0:禁用, 1:启用)
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 1
                  remarks: 版本号
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: lowcode_business_flow
            columnNames: flow_code
            constraintName: uk_business_flow_code
