# lowcode_resource 资源映射表
databaseChangeLog:
  - changeSet:
      id: create-lowcode_resource
      author: lowcode
      changes:
        - createTable:
            tableName: lowcode_resource
            remarks: 资源映射表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resource_path
                  type: varchar(255)
                  remarks: 接口路径
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: varchar(32)
                  defaultValue: entity
                  remarks: 资源类型
              - column:
                  name: schema_id
                  type: bigint
                  remarks: 模型ID
                  constraints:
                    nullable: false
              - column:
                  name: enable_list
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: enable_create
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: enable_update
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: enable_delete
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: enable_export
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: enable_import
                  type: tinyint
                  defaultValueNumeric: 1
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: lowcode_resource
            columnNames: resource_path
            constraintName: uk_resource_path
        - addForeignKeyConstraint:
            baseTableName: lowcode_resource
            baseColumnNames: schema_id
            referencedTableName: lowcode_schema
            referencedColumnNames: id
            constraintName: fk_resource_schema
