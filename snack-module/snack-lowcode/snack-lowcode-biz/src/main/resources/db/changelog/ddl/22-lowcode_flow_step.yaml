# lowcode_flow_step 流程步骤配置表
databaseChangeLog:
  - changeSet:
      id: create-lowcode_flow_step
      author: lowcode
      changes:
        - createTable:
            tableName: lowcode_flow_step
            remarks: 流程步骤配置表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chain_id
                  type: bigint
                  remarks: 关联流程链路
                  constraints:
                    nullable: false
              - column:
                  name: step_id
                  type: varchar(100)
                  remarks: 步骤ID
                  constraints:
                    nullable: false
              - column:
                  name: component_type
                  type: varchar(50)
                  remarks: 组件类型(CRUD:增删改查, MESSAGE:消息, HTTP:网络请求, SCRIPT:脚本, CONDITION:条件, ITERATOR:循环)
                  constraints:
                    nullable: false
              - column:
                  name: step_name
                  type: varchar(200)
                  remarks: 步骤名称
              - column:
                  name: config_json
                  type: clob
                  remarks: 组件配置JSON
              - column:
                  name: execute_mode
                  type: varchar(10)
                  defaultValue: SYNC
                  remarks: 执行模式(SYNC:同步, ASYNC:异步)
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
                  remarks: 排序
              - column:
                  name: enabled
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: 状态(0:禁用, 1:启用)
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - createIndex:
            tableName: lowcode_flow_step
            indexName: idx_flow_step_chain_id
            columns:
              - column:
                  name: chain_id
