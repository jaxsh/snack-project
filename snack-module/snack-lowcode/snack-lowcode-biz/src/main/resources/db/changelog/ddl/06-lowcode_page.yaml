# lowcode_page 页面配置表
databaseChangeLog:
  - changeSet:
      id: create-lowcode_page
      author: lowcode
      changes:
        - createTable:
            tableName: lowcode_page
            remarks: 页面配置表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: schema_id
                  type: bigint
                  remarks: 关联模型ID
                  constraints:
                    nullable: false
              - column:
                  name: page_type
                  type: varchar(32)
                  remarks: 页面类型(create:新增, update:编辑, list:列表, detail:详情)
                  constraints:
                    nullable: false
              - column:
                  name: page_name
                  type: varchar(128)
                  remarks: 页面名称
                  constraints:
                    nullable: false
              - column:
                  name: page_schema
                  type: clob
                  remarks: 界面模型JSON
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: lowcode_page
            columnNames: schema_id, page_type
            constraintName: uk_page_schema_type
        - addForeignKeyConstraint:
            baseTableName: lowcode_page
            baseColumnNames: schema_id
            referencedTableName: lowcode_schema
            referencedColumnNames: id
            constraintName: fk_page_schema
