# 初始化 OAuth 用户数据
databaseChangeLog:
  - changeSet:
      id: insert-oauth_user
      author: oauth
      changes:
        - insert:
            tableName: oauth_user
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: "{bcrypt}$2a$10$qRZi7RVWwVAwX7BqdBWkw.Yum38UwNtm1ANiQBnDadzHYeDUb/7Qq" # password: password
              - column:
                  name: mobile
                  value: "13800138000"
              - column:
                  name: email
                  value: "admin@snack.org"
              - column:
                  name: enabled
                  valueNumeric: 1
              - column:
                  name: locked
                  valueNumeric: 0
              - column:
                  name: expired
                  valueNumeric: 0
              - column:
                  name: initial_password
                  valueNumeric: 1
