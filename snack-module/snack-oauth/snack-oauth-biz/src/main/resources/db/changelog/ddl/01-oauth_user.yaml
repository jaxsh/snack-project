# oauth_user OAuth2 用户表
databaseChangeLog:
  - changeSet:
      id: create-oauth_user
      author: oauth
      changes:
        - createTable:
            tableName: oauth_user
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: 主键ID
              - column:
                  name: username
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
                  remarks: 用户名
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
                  remarks: 密码
              - column:
                  name: mobile
                  type: varchar(20)
                  remarks: 手机号
                  constraints:
                    unique: true
              - column:
                  name: email
                  type: varchar(100)
                  remarks: 邮箱
                  constraints:
                    unique: true
              - column:
                  name: enabled
                  type: tinyint
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
                  remarks: "账户状态(0:禁用, 1:正常)"
              - column:
                  name: locked
                  type: tinyint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "锁定状态(0:正常, 1:锁定)"
              - column:
                  name: lock_until
                  type: TIMESTAMP
                  remarks: "锁定截止时间"
              - column:
                  name: lock_count
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "累计锁定次数"
              - column:
                  name: expired
                  type: tinyint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "过期状态(0:正常, 1:过期)"
              - column:
                  name: last_password_reset_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: "上次改密时间"
              - column:
                  name: initial_password
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: "是否初始密码(0:否, 1:是)"
              - column:
                  name: expire_date
                  type: date
                  remarks: "账号到期日(null:永不到期)"
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
