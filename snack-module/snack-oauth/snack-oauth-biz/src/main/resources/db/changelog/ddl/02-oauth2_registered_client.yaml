# oauth2_registered_client 表结构
databaseChangeLog:
  - changeSet:
      id: create-oauth2_registered_client
      author: Jax Jiang
      changes:
        - createTable:
            tableName: oauth2_registered_client
            remarks: OAuth2 客户端注册表
            columns:
              - column:
                  name: id
                  type: varchar(100)
                  remarks: 主键 ID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: varchar(100)
                  remarks: 客户端 ID
                  constraints:
                    nullable: false
              - column:
                  name: client_id_issued_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 客户端 ID 发行时间
                  constraints:
                    nullable: false
              - column:
                  name: client_secret
                  type: varchar(200)
                  remarks: 客户端密钥
              - column:
                  name: client_secret_expires_at
                  type: TIMESTAMP
                  remarks: 客户端密钥过期时间
              - column:
                  name: client_name
                  type: varchar(200)
                  remarks: 客户端名称
                  constraints:
                    nullable: false
              - column:
                  name: client_authentication_methods
                  type: varchar(1000)
                  remarks: 客户端认证方法 (逗号分隔)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_types
                  type: varchar(1000)
                  remarks: 授权类型 (逗号分隔)
                  constraints:
                    nullable: false
              - column:
                  name: redirect_uris
                  type: varchar(1000)
                  remarks: 重定向 URI (逗号分隔)
              - column:
                  name: post_logout_redirect_uris
                  type: varchar(1000)
                  remarks: 退出登录重定向 URI (逗号分隔)
              - column:
                  name: scopes
                  type: varchar(1000)
                  remarks: 权限范围 (逗号分隔)
                  constraints:
                    nullable: false
              - column:
                  name: client_settings
                  type: varchar(2000)
                  remarks: 客户端设置 (JSON)
                  constraints:
                    nullable: false
              - column:
                  name: token_settings
                  type: varchar(2000)
                  remarks: 令牌设置 (JSON)
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_time
                  type: TIMESTAMP
                  remarks: 更新时间
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
        - addUniqueConstraint:
            tableName: oauth2_registered_client
            columnNames: client_id
            constraintName: uk_client_id
      rollback:
        - dropTable:
            tableName: oauth2_registered_client
