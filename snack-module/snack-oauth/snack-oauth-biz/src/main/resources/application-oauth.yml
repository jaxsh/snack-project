spring:
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=10m,maximumSize=10000
  messages:
    basename: i18n/messages,org.springframework.security.messages

snack:
  oauth:
    security:
      rsa:
        keys:
          - key-id: snack-jwt-key-v1
            private-key: classpath:keys/jwt-private.pem
            public-key: classpath:keys/jwt-public.pem
            active: true
  security:
    policy:
      login-page: ${OAUTH_LOGIN_PAGE:/user/login}
      pre-auth-pages:
        pre_auth_reset: /account/change-password
        pre_auth_mfa: /account/verify-mfa
  mfa:
    type: TOTP

---
spring:
  config:
    activate:
      on-profile: dev
snack:
  security:
    policy:
      login-page: http://localhost:8000/user/login

