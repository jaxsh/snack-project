# ============================================
# OAuth 模块 - 数据库 Changelog 自动入口
# ============================================

databaseChangeLog:

  # 1. 结构层：自动扫描 Classpath 下所有 DDL
  - includeAll:
      path: "db/changelog/ddl/"

  # 2. 数据层：自动扫描 Classpath 下所有 DML
  - includeAll:
      path: "db/changelog/dml/"
