# sys_message_template 消息模版表
databaseChangeLog:
  - changeSet:
      id: create-sys_message_template
      author: upms
      changes:
        - createTable:
            tableName: sys_message_template
            remarks: 消息模版表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: template_code
                  type: varchar(64)
                  remarks: 模版编码
                  constraints:
                    nullable: false
              - column:
                  name: template_name
                  type: varchar(100)
                  remarks: 模版名称
                  constraints:
                    nullable: false
              - column:
                  name: template_type
                  type: varchar(20)
                  remarks: 模板类型(MAIL:邮件, SMS:短信, SITE:站内信)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  remarks: 标题
              - column:
                  name: content
                  type: longtext
                  remarks: 模版内容
              - column:
                  name: template_config
                  type: json
                  remarks: 渠道配置
              - column:
                  name: status
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: 状态(0:禁用, 1:启用)
              - column:
                  name: remark
                  type: varchar(500)
                  remarks: 备注
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: sys_message_template
            columnNames: template_code, template_type
            constraintName: uk_msg_tmpl_code_type
