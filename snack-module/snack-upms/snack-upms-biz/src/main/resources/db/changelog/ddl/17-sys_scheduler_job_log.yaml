# sys_scheduler_job_log 定时任务执行日志表
databaseChangeLog:
  - changeSet:
      id: create-sys_scheduler_job_log
      author: upms
      changes:
        - createTable:
            tableName: sys_scheduler_job_log
            remarks: 定时任务执行日志表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: job_id
                  type: bigint
                  remarks: 关联任务ID
                  constraints:
                    nullable: false
              - column:
                  name: job_name
                  type: varchar(100)
                  remarks: 任务名称
                  constraints:
                    nullable: false
              - column:
                  name: duration
                  type: bigint
                  remarks: 执行时长
              - column:
                  name: status
                  type: tinyint
                  remarks: 执行状态(0:失败, 1:成功)
              - column:
                  name: error_message
                  type: text
                  remarks: 错误信息
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - createIndex:
            tableName: sys_scheduler_job_log
            indexName: idx_job_id
            columns:
              - column:
                  name: job_id
        - createIndex:
            tableName: sys_scheduler_job_log
            indexName: idx_create_time
            columns:
              - column:
                  name: create_time
