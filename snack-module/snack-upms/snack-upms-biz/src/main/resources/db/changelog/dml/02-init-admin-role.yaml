# 初始化管理员角色和权限
databaseChangeLog:
  - changeSet:
      id: insert-admin-sys_role
      author: upms
      changes:
        - insert:
            tableName: sys_role
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: role_name
                  value: 超级管理员
              - column:
                  name: role_code
                  value: admin
              - column:
                  name: role_desc
                  value: 拥有系统所有权限
              - column:
                  name: status
                  valueNumeric: 1
              - column:
                  name: create_by
                  value: system
              - column:
                  name: create_time
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: update_by
                  value: system
              - column:
                  name: update_time
                  valueComputed: CURRENT_TIMESTAMP
        - insert:
            tableName: sys_user_role
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: username
                  value: admin
              - column:
                  name: role_code
                  value: admin
              - column:
                  name: create_by
                  value: system
              - column:
                  name: create_time
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: update_by
                  value: system
              - column:
                  name: update_time
                  valueComputed: CURRENT_TIMESTAMP
        - insert:
            tableName: sys_user
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: username
                  value: admin
              - column:
                  name: nickname
                  value: 管理员
              - column:
                  name: create_by
                  value: system
              - column:
                  name: create_time
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: update_by
                  value: system
              - column:
                  name: update_time
                  valueComputed: CURRENT_TIMESTAMP
