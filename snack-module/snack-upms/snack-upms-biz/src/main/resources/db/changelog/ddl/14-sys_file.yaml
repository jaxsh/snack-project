# sys_file 逻辑文件表
databaseChangeLog:
  - changeSet:
      id: create-sys_file
      author: upms
      changes:
        - createTable:
            tableName: sys_file
            remarks: 逻辑文件表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: storage_id
                  type: bigint
                  remarks: 物理文件ID
                  constraints:
                    nullable: false
              - column:
                  name: original_name
                  type: varchar(255)
                  remarks: 原始文件名
                  constraints:
                    nullable: false
              - column:
                  name: access_level
                  type: tinyint
                  defaultValueNumeric: 0
                  remarks: 访问级别

              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - createIndex:
            tableName: sys_file
            indexName: idx_file_storage_id
            columns:
              - column:
                  name: storage_id
