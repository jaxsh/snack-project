# sys_role 角色表
databaseChangeLog:
  - changeSet:
      id: create-sys_role
      author: upms
      changes:
        - createTable:
            tableName: sys_role
            remarks: 角色表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_name
                  type: varchar(50)
                  remarks: 角色名称
                  constraints:
                    nullable: false
              - column:
                  name: role_code
                  type: varchar(50)
                  remarks: 角色编码(唯一)
                  constraints:
                    nullable: false
              - column:
                  name: role_desc
                  type: varchar(255)
                  remarks: 角色描述
              - column:
                  name: status
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: 状态(0:禁用, 1:启用)
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: sys_role
            columnNames: role_code
            constraintName: uk_role_code
