# sys_scheduler_job 表结构
databaseChangeLog:
  - changeSet:
      id: create-sys_scheduler_job
      author: upms
      changes:
        - createTable:
            tableName: sys_scheduler_job
            remarks: 定时任务表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: job_name
                  type: varchar(100)
                  remarks: 任务名称 (唯一)
                  constraints:
                    nullable: false
              - column:
                  name: job_class_name
                  type: varchar(255)
                  remarks: Job 执行类全限定名
                  constraints:
                    nullable: false
              - column:
                  name: cron_expression
                  type: varchar(100)
                  remarks: Cron 表达式
                  constraints:
                    nullable: false
              - column:
                  name: job_data
                  type: text
                  remarks: 任务参数 (JSON)
              - column:
                  name: status
                  type: tinyint
                  defaultValueNumeric: '1'
                  remarks: 状态(0:暂停, 1:运行)
              - column:
                  name: description
                  type: varchar(500)
                  remarks: 描述
              - column:
                  name: deleted
                  type: tinyint
                  defaultValueNumeric: '0'
                  remarks: 是否删除(0:否, 1:是)
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: sys_scheduler_job
            columnNames: job_name
            constraintName: uk_job_name
        - createIndex:
            tableName: sys_scheduler_job
            indexName: idx_status
            columns:
              - column:
                  name: status
