# sys_user 新增 status/mobile/email 字段
databaseChangeLog:
  - changeSet:
      id: alter-sys_user-add-status-mobile-email
      author: upms
      changes:
        - addColumn:
            tableName: sys_user
            columns:
              - column:
                  name: status
                  type: tinyint(1)
                  defaultValueNumeric: 1
                  remarks: "账户状态(0:禁用, 1:启用)"
              - column:
                  name: mobile
                  type: varchar(20)
                  remarks: 手机号
              - column:
                  name: email
                  type: varchar(100)
                  remarks: 邮箱
