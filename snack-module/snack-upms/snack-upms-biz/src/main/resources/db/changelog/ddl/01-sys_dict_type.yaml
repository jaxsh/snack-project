# sys_dict_type 字典类型表
databaseChangeLog:
  - changeSet:
      id: create-sys_dict_type
      author: upms
      changes:
        - createTable:
            tableName: sys_dict_type
            remarks: 字典类型表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dict_name
                  type: varchar(100)
                  remarks: 字典名称
                  constraints:
                    nullable: false
              - column:
                  name: dict_type
                  type: varchar(100)
                  remarks: 字典类型
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: tinyint
                  defaultValueNumeric: 1
                  remarks: 状态(0:禁用, 1:启用)
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
                  remarks: 排序
              - column:
                  name: remark
                  type: varchar(500)
                  remarks: 备注
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: sys_dict_type
            columnNames: dict_type
            constraintName: uk_dict_type
        - createIndex:
            tableName: sys_dict_type
            indexName: idx_status
            columns:
              - column:
                  name: status
