# sys_message_log 消息发送日志表
databaseChangeLog:
  - changeSet:
      id: create-sys_message_log
      author: upms
      changes:
        - createTable:
            tableName: sys_message_log
            remarks: 消息发送日志表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: template_code
                  type: varchar(64)
                  remarks: 模版编码
              - column:
                  name: channel_type
                  type: varchar(20)
                  remarks: 渠道类型
                  constraints:
                    nullable: false
              - column:
                  name: channel_id
                  type: varchar(32)
                  remarks: 渠道标识
              - column:
                  name: recipient
                  type: varchar(255)
                  remarks: 接收人
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  remarks: 标题
              - column:
                  name: content
                  type: text
                  remarks: 渲染后内容
              - column:
                  name: params
                  type: json
                  remarks: 占位符参数
              - column:
                  name: status
                  type: tinyint
                  remarks: 状态(0:成功, 1:失败)
                  constraints:
                    nullable: false
              - column:
                  name: error_msg
                  type: varchar(500)
                  remarks: 失败原因
              - column:
                  name: channel_response
                  type: json
                  remarks: 渠道原始响应
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - createIndex:
            tableName: sys_message_log
            indexName: idx_msg_log_template_code
            columns:
              - column:
                  name: template_code
        - createIndex:
            tableName: sys_message_log
            indexName: idx_msg_log_create_time
            columns:
              - column:
                  name: create_time
