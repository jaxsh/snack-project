# sys_id_rule ID 规则表
databaseChangeLog:
  - changeSet:
      id: create-sys_id_rule
      author: upms
      changes:
        - createTable:
            tableName: sys_id_rule
            remarks: ID规则表
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rule_code
                  type: varchar(64)
                  remarks: 规则编码(唯一)
                  constraints:
                    nullable: false
              - column:
                  name: rule_name
                  type: varchar(100)
                  remarks: 规则名称
                  constraints:
                    nullable: false
              - column:
                  name: segments
                  type: json
                  remarks: 分段规则配置
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  remarks: 规则描述
              - column:
                  name: reset_cycle
                  type: varchar(20)
                  defaultValue: 'NEVER'
                  remarks: 序列号重置周期(NEVER:不重置, DAILY:每天, MONTHLY:每月, YEARLY:每年)
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: varchar(64)
                  remarks: 创建人
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_by
                  type: varchar(64)
                  remarks: 更新人
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
        - addUniqueConstraint:
            tableName: sys_id_rule
            columnNames: rule_code
            constraintName: uk_rule_code
