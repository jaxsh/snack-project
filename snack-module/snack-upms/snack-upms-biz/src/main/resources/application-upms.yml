mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    org.springframework.security: DEBUG

snack:
  mvc:
    validation:
      fail-fast: false
  oauth2:
    client:
      server-url: ${OAUTH_SERVER_URL}
      login-page: ${OAUTH_LOGIN_PAGE:/user/login}
      default-success-url: ${OAUTH_DEFAULT_SUCCESS_URL:/}
      end-session-endpoint-uri: ${snack.oauth2.client.server-url}/connect/logout
      max-sessions: -1
spring:
  security:
    oauth2:
      client:
        registration:
          snack-upms-server:
            provider: snack-oauth
            client-id: snack-upms-server
            client-secret: ${OAUTH_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile
          snack-upms-service:
            provider: snack-oauth
            client-id: snack-upms-service
            client-secret: ${OAUTH_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: client
        provider:
          snack-oauth:
            authorization-uri: ${snack.oauth2.client.server-url}/oauth2/authorize
            token-uri: ${snack.oauth2.client.server-url}/oauth2/token
            jwk-set-uri: ${snack.oauth2.client.server-url}/oauth2/jwks
            user-info-uri: ${snack.oauth2.client.server-url}/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          jwk-set-uri: ${snack.oauth2.client.server-url}/oauth2/jwks

---
spring:
  config:
    activate:
      on-profile: dev
  security:
    oauth2:
      client:
        registration:
          snack-upms-server:
            client-secret: secret
          snack-upms-service:
            client-secret: secret
snack:
  oauth2:
    client:
      server-url: ${OAUTH_SERVER_URL:http://localhost:9000}
      login-page: http://localhost:8000/user/login
      default-success-url: http://localhost:8000/
