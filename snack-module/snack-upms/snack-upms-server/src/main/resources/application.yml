spring:
  profiles:
    active: upms,${ENV:dev}
  application:
    name: upms-server
  docker:
    compose:
      lifecycle-management: start-and-stop
      file: compose.yml
      skip:
        in-tests: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

logging:
  file:
    name: logs/${spring.application.name}.log
